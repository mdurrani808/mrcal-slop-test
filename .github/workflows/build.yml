name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    outputs:
      artifact-name:
        value: ${{ jobs.build-linux-amd64.outputs.artifact-name }}

jobs:
  # -------------------------------------------------------------------------
  # Linux amd64 — native runner, build deps from source
  # -------------------------------------------------------------------------
  build-linux-amd64:
    name: Linux amd64
    runs-on: ubuntu-24.04
    outputs:
      artifact-name: mrcal-linux-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Install system build prerequisites
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential g++ gfortran cmake git \
            patchelf perl libpng-dev libjpeg-dev \
            python3-dev python3-numpy python3-pip \
            liblist-moreutils-perl curl libelf-dev chrpath re2c \
            libopenblas-dev libopencv-dev libboost-dev libstb-dev

      - name: Build all deps and mrcal
        env:
          WORK_DIR: /tmp/mrcal-build
          INSTALL_PREFIX: /tmp/mrcal-deps
          OUT_DIR: ${{ runner.temp }}/artifacts
        run: bash scripts/build-all.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mrcal-linux-amd64
          path: ${{ runner.temp }}/artifacts/*.tar.gz
          retention-days: 7

  # -------------------------------------------------------------------------
  # Smoketest — Linux amd64
  # -------------------------------------------------------------------------
  smoketest-linux-amd64:
    name: Smoketest Linux amd64
    needs: build-linux-amd64
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake and C++ toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends cmake g++

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: mrcal-linux-amd64
          path: /tmp/mrcal-artifact

      - name: Extract tarball
        run: |
          cd /tmp/mrcal-artifact
          tar -xzf *.tar.gz
          echo "MRCAL_PREFIX=$(ls -d /tmp/mrcal-artifact/mrcal-*/)" >> "$GITHUB_ENV"

      - name: Build smoketest
        run: |
          cmake -B /tmp/smoketest-build \
            -DCMAKE_PREFIX_PATH="$MRCAL_PREFIX" \
            "$GITHUB_WORKSPACE/tests"
          cmake --build /tmp/smoketest-build

      - name: Run smoketest
        run: LD_LIBRARY_PATH="$MRCAL_PREFIX/lib" /tmp/smoketest-build/smoketest

  # -------------------------------------------------------------------------
  # Linux arm64 — native runner, build deps from source
  # -------------------------------------------------------------------------
  build-linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install system build prerequisites
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential g++ gfortran cmake git \
            patchelf perl libpng-dev libjpeg-dev \
            python3-dev python3-numpy python3-pip \
            liblist-moreutils-perl curl libelf-dev chrpath re2c \
            libopenblas-dev libopencv-dev libboost-dev libstb-dev

      - name: Build all deps and mrcal
        env:
          WORK_DIR: /tmp/mrcal-build
          INSTALL_PREFIX: /tmp/mrcal-deps
          OUT_DIR: ${{ runner.temp }}/artifacts
        run: bash scripts/build-all.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mrcal-linux-arm64
          path: ${{ runner.temp }}/artifacts/*.tar.gz
          retention-days: 7

  # -------------------------------------------------------------------------
  # Smoketest — Linux arm64
  # -------------------------------------------------------------------------
  smoketest-linux-arm64:
    name: Smoketest Linux arm64
    needs: build-linux-arm64
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake and C++ toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends cmake g++

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: mrcal-linux-arm64
          path: /tmp/mrcal-artifact

      - name: Extract tarball
        run: |
          cd /tmp/mrcal-artifact
          tar -xzf *.tar.gz
          echo "MRCAL_PREFIX=$(ls -d /tmp/mrcal-artifact/mrcal-*/)" >> "$GITHUB_ENV"

      - name: Build smoketest
        run: |
          cmake -B /tmp/smoketest-build \
            -DCMAKE_PREFIX_PATH="$MRCAL_PREFIX" \
            "$GITHUB_WORKSPACE/tests"
          cmake --build /tmp/smoketest-build

      - name: Run smoketest
        run: LD_LIBRARY_PATH="$MRCAL_PREFIX/lib" /tmp/smoketest-build/smoketest

  # -------------------------------------------------------------------------
  # macOS arm64 (Apple Silicon) — native runner, build deps from source
  # -------------------------------------------------------------------------
  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install system build prerequisites
        run: xcode-select --install 2>/dev/null || true

      - name: Build all deps and mrcal
        env:
          WORK_DIR: /tmp/mrcal-build
          INSTALL_PREFIX: /tmp/mrcal-deps
          OUT_DIR: ${{ runner.temp }}/artifacts
        run: bash scripts/build-all.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mrcal-macos-arm64
          path: ${{ runner.temp }}/artifacts/*.tar.gz
          retention-days: 7

  # -------------------------------------------------------------------------
  # Smoketest — macOS arm64
  # -------------------------------------------------------------------------
  smoketest-macos-arm64:
    name: Smoketest macOS arm64
    needs: build-macos-arm64
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: mrcal-macos-arm64
          path: /tmp/mrcal-artifact

      - name: Extract tarball
        run: |
          cd /tmp/mrcal-artifact
          tar -xzf *.tar.gz
          echo "MRCAL_PREFIX=$(ls -d /tmp/mrcal-artifact/mrcal-*/)" >> "$GITHUB_ENV"

      - name: Build smoketest
        run: |
          cmake -B /tmp/smoketest-build \
            -DCMAKE_PREFIX_PATH="$MRCAL_PREFIX" \
            "$GITHUB_WORKSPACE/tests"
          cmake --build /tmp/smoketest-build

      - name: Run smoketest
        run: DYLD_LIBRARY_PATH="$MRCAL_PREFIX/lib" /tmp/smoketest-build/smoketest
