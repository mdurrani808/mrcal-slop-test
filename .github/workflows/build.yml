name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    outputs:
      artifact-name:
        value: ${{ jobs.build-linux-amd64.outputs.artifact-name }}

jobs:
  # -------------------------------------------------------------------------
  # Linux amd64 — Docker build for maximum reproducibility
  # -------------------------------------------------------------------------
  build-linux-amd64:
    name: Linux amd64
    runs-on: ubuntu-22.04
    outputs:
      artifact-name: mrcal-linux-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image and extract tarball
        run: |
          docker build \
            --file docker/Dockerfile.linux-amd64 \
            --tag mrcal-builder-amd64 \
            .

          mkdir -p ${{ runner.temp }}/artifacts
          docker create --name mrcal-tmp mrcal-builder-amd64
          docker cp mrcal-tmp:/artifacts/. ${{ runner.temp }}/artifacts/
          docker rm mrcal-tmp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mrcal-linux-amd64
          path: ${{ runner.temp }}/artifacts/*.tar.gz
          retention-days: 7

  # -------------------------------------------------------------------------
  # Smoketest — Linux amd64
  # -------------------------------------------------------------------------
  smoketest-linux-amd64:
    name: Smoketest Linux amd64
    needs: build-linux-amd64
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake and C++ toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends cmake g++

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: mrcal-linux-amd64
          path: /tmp/mrcal-artifact

      - name: Extract tarball
        run: |
          cd /tmp/mrcal-artifact
          tar -xzf *.tar.gz
          # Export the extracted prefix so subsequent steps can use it.
          echo "MRCAL_PREFIX=$(ls -d /tmp/mrcal-artifact/mrcal-*/)" >> "$GITHUB_ENV"

      - name: Build smoketest
        run: |
          cmake -B /tmp/smoketest-build \
            -DCMAKE_PREFIX_PATH="$MRCAL_PREFIX" \
            "$GITHUB_WORKSPACE/tests"
          cmake --build /tmp/smoketest-build

      - name: Run smoketest
        run: LD_LIBRARY_PATH="$MRCAL_PREFIX/lib" /tmp/smoketest-build/smoketest

  # -------------------------------------------------------------------------
  # Linux arm64 — same Dockerfile but via QEMU emulation
  # (slow; runs only on tags or manual dispatch to avoid wasting CI minutes)
  # -------------------------------------------------------------------------
  build-linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-22.04
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (arm64) and extract tarball
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --file docker/Dockerfile.linux-amd64 \
            --tag mrcal-builder-arm64 \
            --load \
            .

          mkdir -p ${{ runner.temp }}/artifacts
          docker create --name mrcal-tmp mrcal-builder-arm64
          docker cp mrcal-tmp:/artifacts/. ${{ runner.temp }}/artifacts/
          docker rm mrcal-tmp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mrcal-linux-arm64
          path: ${{ runner.temp }}/artifacts/*.tar.gz
          retention-days: 7

  # -------------------------------------------------------------------------
  # Smoketest — Linux arm64 (runs inside an emulated arm64 container)
  # -------------------------------------------------------------------------
  smoketest-linux-arm64:
    name: Smoketest Linux arm64
    needs: build-linux-arm64
    runs-on: ubuntu-22.04
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: mrcal-linux-arm64
          path: /tmp/mrcal-artifact

      - name: Extract tarball
        run: |
          cd /tmp/mrcal-artifact
          tar -xzf *.tar.gz

      - name: Build and run smoketest inside arm64 container
        run: |
          MRCAL_PREFIX="$(ls -d /tmp/mrcal-artifact/mrcal-*/)"
          docker run --rm --platform linux/arm64 \
            -v "$GITHUB_WORKSPACE/tests:/tests:ro" \
            -v "${MRCAL_PREFIX}:${MRCAL_PREFIX}:ro" \
            ubuntu:22.04 \
            bash -c "
              set -euo pipefail
              apt-get update -q
              apt-get install -y --no-install-recommends cmake g++ 2>/dev/null
              cmake -B /tmp/smoketest-build \
                -DCMAKE_PREFIX_PATH='${MRCAL_PREFIX}' \
                /tests
              cmake --build /tmp/smoketest-build
              LD_LIBRARY_PATH='${MRCAL_PREFIX}/lib' /tmp/smoketest-build/smoketest
            "

  # -------------------------------------------------------------------------
  # macOS arm64 (Apple Silicon) — native runner, build deps from source
  # -------------------------------------------------------------------------
  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install system build prerequisites
        run: xcode-select --install 2>/dev/null || true

      - name: Build all deps and mrcal
        env:
          WORK_DIR: /tmp/mrcal-build
          INSTALL_PREFIX: /tmp/mrcal-deps
          OUT_DIR: ${{ runner.temp }}/artifacts
        run: bash scripts/build-all.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mrcal-macos-arm64
          path: ${{ runner.temp }}/artifacts/*.tar.gz
          retention-days: 7

  # -------------------------------------------------------------------------
  # Smoketest — macOS arm64
  # -------------------------------------------------------------------------
  smoketest-macos-arm64:
    name: Smoketest macOS arm64
    needs: build-macos-arm64
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: mrcal-macos-arm64
          path: /tmp/mrcal-artifact

      - name: Extract tarball
        run: |
          cd /tmp/mrcal-artifact
          tar -xzf *.tar.gz
          echo "MRCAL_PREFIX=$(ls -d /tmp/mrcal-artifact/mrcal-*/)" >> "$GITHUB_ENV"

      - name: Build smoketest
        run: |
          cmake -B /tmp/smoketest-build \
            -DCMAKE_PREFIX_PATH="$MRCAL_PREFIX" \
            "$GITHUB_WORKSPACE/tests"
          cmake --build /tmp/smoketest-build

      - name: Run smoketest
        run: DYLD_LIBRARY_PATH="$MRCAL_PREFIX/lib" /tmp/smoketest-build/smoketest
