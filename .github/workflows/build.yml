name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    outputs:
      artifact-name:
        value: ${{ jobs.build-linux-amd64.outputs.artifact-name }}

jobs:
  # -------------------------------------------------------------------------
  # Linux amd64 — Docker build for maximum reproducibility
  # -------------------------------------------------------------------------
  build-linux-amd64:
    name: Linux amd64
    runs-on: ubuntu-22.04
    outputs:
      artifact-name: mrcal-linux-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image and extract tarball
        run: |
          # Build the image; the RUN scripts produce the tarball at /artifacts/
          docker build \
            --file docker/Dockerfile.linux-amd64 \
            --tag mrcal-builder-amd64 \
            .

          # Copy the tarball out of the image layer
          mkdir -p ${{ runner.temp }}/artifacts
          docker create --name mrcal-tmp mrcal-builder-amd64
          docker cp mrcal-tmp:/artifacts/. ${{ runner.temp }}/artifacts/
          docker rm mrcal-tmp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mrcal-linux-amd64
          path: ${{ runner.temp }}/artifacts/*.tar.gz
          retention-days: 7

  # -------------------------------------------------------------------------
  # Linux arm64 — same Dockerfile but via QEMU emulation
  # (slow; enable only on tags or manual dispatch to avoid wasting CI minutes)
  # -------------------------------------------------------------------------
  build-linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-22.04
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (arm64) and extract tarball
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --file docker/Dockerfile.linux-amd64 \
            --tag mrcal-builder-arm64 \
            --load \
            .

          mkdir -p ${{ runner.temp }}/artifacts
          docker create --name mrcal-tmp mrcal-builder-arm64
          docker cp mrcal-tmp:/artifacts/. ${{ runner.temp }}/artifacts/
          docker rm mrcal-tmp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mrcal-linux-arm64
          path: ${{ runner.temp }}/artifacts/*.tar.gz
          retention-days: 7

  # -------------------------------------------------------------------------
  # macOS arm64 (Apple Silicon) — native runner, build deps from source
  # -------------------------------------------------------------------------
  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install system build prerequisites
        run: |
          # Only what can't be compiled from scratch easily:
          # Xcode tools (cc, make, cmake already on runner)
          # Perl (already on runner)
          # No brew installs — everything else built from source
          xcode-select --install 2>/dev/null || true

      - name: Build all deps and mrcal
        env:
          WORK_DIR: /tmp/mrcal-build
          INSTALL_PREFIX: /tmp/mrcal-deps
          OUT_DIR: ${{ runner.temp }}/artifacts
        run: bash scripts/build-all.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mrcal-macos-arm64
          path: ${{ runner.temp }}/artifacts/*.tar.gz
          retention-days: 7

  # -------------------------------------------------------------------------
  # macOS x86_64 (Intel) — same script, different runner
  # -------------------------------------------------------------------------
  build-macos-x86_64:
    name: macOS x86_64
    runs-on: macos-13
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Build all deps and mrcal
        env:
          WORK_DIR: /tmp/mrcal-build
          INSTALL_PREFIX: /tmp/mrcal-deps
          OUT_DIR: ${{ runner.temp }}/artifacts
        run: bash scripts/build-all.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mrcal-macos-x86_64
          path: ${{ runner.temp }}/artifacts/*.tar.gz
          retention-days: 7
